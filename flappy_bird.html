<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird - Single File</title>
<style>
body{
  margin:0;
  background:#70c5ce;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial, sans-serif;
}
canvas{
  background:#70c5ce;
  border:2px solid #000;
}
#ui{
  position:absolute;
  top:20px;
  text-align:center;
  width:100%;
  color:white;
  font-size:24px;
  font-weight:bold;
  text-shadow:2px 2px 4px black;
}
</style>
</head>
<body>

<div id="ui">Click / Tap / Space to Jump</div>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let bird = {
  x:80,
  y:200,
  width:30,
  height:30,
  velocity:0,
  gravity:0.5,
  jump:-8
};

let pipes = [];
let pipeWidth = 60;
let gap = 160;
let frame = 0;
let score = 0;
let gameOver = false;

function resetGame(){
  bird.y = 200;
  bird.velocity = 0;
  pipes = [];
  frame = 0;
  score = 0;
  gameOver = false;
  ui.innerHTML = "Click / Tap / Space to Jump";
}

function spawnPipe(){
  let topHeight = Math.random() * 250 + 50;
  pipes.push({
    x:canvas.width,
    top:topHeight,
    bottom:topHeight + gap,
    passed:false
  });
}

function update(){
  if(gameOver) return;

  frame++;

  if(frame % 90 === 0){
    spawnPipe();
  }

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  pipes.forEach(pipe=>{
    pipe.x -= 2;

    if(!pipe.passed && pipe.x + pipeWidth < bird.x){
      pipe.passed = true;
      score++;
    }

    if(
      bird.x < pipe.x + pipeWidth &&
      bird.x + bird.width > pipe.x &&
      (bird.y < pipe.top || bird.y + bird.height > pipe.bottom)
    ){
      endGame();
    }
  });

  if(bird.y + bird.height > canvas.height || bird.y < 0){
    endGame();
  }

  pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "green";
  pipes.forEach(pipe=>{
    ctx.fillRect(pipe.x,0,pipeWidth,pipe.top);
    ctx.fillRect(pipe.x,pipe.bottom,pipeWidth,canvas.height);
  });

  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x,bird.y,bird.width,bird.height);

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText(score,20,50);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function jump(){
  if(gameOver){
    resetGame();
    return;
  }
  bird.velocity = bird.jump;
}

function endGame(){
  gameOver = true;
  ui.innerHTML = "Game Over<br>Score: " + score + "<br>Click / Space to Restart";
}

document.addEventListener("keydown",e=>{
  if(e.code === "Space") jump();
});

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",jump);

resetGame();
loop();
</script>

</body>
</html>
